<!DOCTYPE html>
<html>
<head>
    <title>Upload Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<div class="auth-container">
    <h2>Upload a New Post</h2>
    <form method="POST" enctype="multipart/form-data" class="auth-form">
        <div class="mb-3">
            <label for="text" class="form-label">Post Text (optional)</label>
            <textarea class="form-control" id="text" name="text" rows="3" placeholder="Share your thoughts..."></textarea>
        </div>
        <div class="mb-3">
            <label for="video" class="form-label">Upload Video or Photo (optional)</label>
            <div class="upload-file-input">
                <input type="file" id="video" name="video" accept="video/*,image/*">
                <div class="upload-file-label">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Choose file or drag and drop</span>
                </div>
            </div>
            <div id="file-name" class="upload-file-name">No file selected</div>
        </div>
        <button type="submit" class="btn w-100">Post</button>
    </form>
    <a href="/" class="btn btn-secondary mt-3">Back to Feed</a>
</div>

<script>
document.getElementById('video').addEventListener('change', function(e) {
    const fileName = e.target.files[0] ? e.target.files[0].name : 'No file selected';
    document.getElementById('file-name').textContent = fileName;
});

// Drag and drop functionality
const dropZone = document.querySelector('.upload-file-input');
const fileInput = document.getElementById('video');

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.querySelector('.upload-file-label').style.borderColor = '#0ea5e9';
});

dropZone.addEventListener('dragleave', () => {
    dropZone.querySelector('.upload-file-label').style.borderColor = '#38bdf8';
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.querySelector('.upload-file-label').style.borderColor = '#38bdf8';

    const files = e.dataTransfer.files;
    if (files.length > 0) {
        fileInput.files = files;
        document.getElementById('file-name').textContent = files[0].name;
    }
});
</script>
</body>
</html>
